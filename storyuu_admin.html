<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280" />
<title>Storyuu Admin · Where stories come alive</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-0: #F4F5F7;
  --bg-1: #FFFFFF;
  --bg-2: #F9FAFB;
  --bg-3: #F3F4F6;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F9FAFB;
  --border: #E5E7EB;
  --border-hover: #D1D5DB;
  --text-1: #111827;
  --text-2: #4B5563;
  --text-3: #6B7280;
  --text-4: #9CA3AF;
  --orange: #FF6B4A;
  --orange-soft: rgba(255, 107, 74, 0.12);
  --orange-glow: rgba(255, 107, 74, 0.25);
  --blue: #07C2EF;
  --blue-soft: rgba(7, 194, 239, 0.12);
  --purple: #8B5CF6;
  --purple-soft: rgba(139, 92, 246, 0.12);
  --pink: #EC4899;
  --pink-soft: rgba(236, 72, 153, 0.12);
  --green: #10B981;
  --green-soft: rgba(16, 185, 129, 0.12);
  --amber: #F59E0B;
  --amber-soft: rgba(245, 158, 11, 0.12);
  --red: #EF4444;
  --red-soft: rgba(239, 68, 68, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text-1);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background: var(--bg-0);
}

/* ============ Display font ============ */
.display { font-family: 'Fraunces', Georgia, serif; font-weight: 400; letter-spacing: -0.02em; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

/* ============ App shell ============ */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
  max-width: 1600px;
  margin: 0 auto;
}

/* ============ Sidebar ============ */
.sidebar {
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 10px 28px;
}
.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--orange) 0%, #FF8568 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px var(--orange-glow);
}
.brand-text { display: flex; flex-direction: column; line-height: 1; }
.brand-name {
  font-family: 'Fraunces', serif;
  font-size: 21px;
  font-weight: 500;
  color: var(--orange);
  letter-spacing: -0.02em;
}
.brand-sub {
  font-size: 9px;
  color: var(--blue);
  margin-top: 4px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
}

.nav-label {
  font-size: 10px;
  color: var(--text-4);
  letter-spacing: 1.6px;
  text-transform: uppercase;
  padding: 14px 12px 6px;
  font-weight: 500;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 12px;
  border-radius: 9px;
  font-size: 13px;
  color: var(--text-2);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  user-select: none;
}
.nav-item:hover {
  background: rgba(0, 0, 0, 0.035);
  color: var(--text-1);
}
.nav-item.active {
  background: linear-gradient(90deg, var(--orange-soft), rgba(255, 107, 74, 0.02));
  color: var(--orange);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--orange);
  border-radius: 0 2px 2px 0;
}
.nav-item svg { flex-shrink: 0; }
.nav-pill {
  margin-left: auto;
  font-size: 10px;
  background: rgba(0, 0, 0, 0.04);
  color: var(--text-2);
  padding: 2px 7px;
  border-radius: 99px;
  font-weight: 500;
}
.nav-pill.live {
  background: var(--orange-soft);
  color: var(--orange);
}
.nav-pill.live::before {
  content: '';
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--orange);
  margin-right: 5px;
  vertical-align: middle;
  animation: pulse 1.6s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.profile-card {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.profile {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.profile:hover { background: var(--bg-3); }
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), #FF9776);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: #1a1a1a;
  flex-shrink: 0;
}
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 12px; font-weight: 500; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.profile-role { font-size: 10px; color: var(--blue); }

/* ============ Main ============ */
.main {
  padding: 28px 36px 60px;
  min-width: 0;
  position: relative;
}

/* ============ Top bar ============ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.topbar-left h1 {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--text-1);
  letter-spacing: -0.02em;
}
.topbar-left h1 em { font-style: italic; color: var(--orange); font-weight: 300; }
.eyebrow {
  font-size: 10px;
  color: var(--text-4);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}
.topbar-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 99px;
  font-size: 12px;
  color: var(--text-2);
  width: 240px;
  transition: all 0.15s;
}
.search:focus-within { border-color: var(--blue); background: rgba(77, 208, 255, 0.04); }
.search input {
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--text-1);
  font-size: 12px;
  width: 100%;
  font-family: inherit;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  border: 1px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--orange);
  color: #1a1a1a;
  border-color: var(--orange);
}
.btn-primary:hover { background: #FF8568; box-shadow: 0 4px 16px var(--orange-glow); transform: translateY(-1px); }
.btn-secondary {
  background: rgba(255, 255, 255, 0.04);
  color: var(--text-1);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--bg-3); border-color: var(--border-hover); }
.btn-ghost {
  background: transparent;
  color: var(--text-2);
}
.btn-ghost:hover { background: var(--bg-2); color: var(--text-1); }
.btn-blue {
  background: var(--blue);
  color: #042C53;
  border-color: var(--blue);
}
.btn-blue:hover { background: #7DDFFF; box-shadow: 0 4px 16px rgba(77, 208, 255, 0.25); }
.btn-danger {
  background: var(--red-soft);
  color: var(--red);
  border-color: rgba(255, 92, 122, 0.3);
}
.btn-danger:hover { background: rgba(255, 92, 122, 0.2); }

/* ============ Cards ============ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 22px;
  transition: all 0.15s;
}
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 16px;
}
.card-title { font-size: 14px; font-weight: 500; color: var(--text-1); }
.card-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent, var(--orange));
}
.kpi-orange { --accent: var(--orange); }
.kpi-blue { --accent: var(--blue); }
.kpi-purple { --accent: var(--purple); }
.kpi-green { --accent: var(--green); }
.kpi-row { display: flex; justify-content: space-between; align-items: center; }
.kpi-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.4px; }
.kpi-num { font-size: 30px; font-weight: 500; color: var(--text-1); margin-top: 6px; letter-spacing: -1px; font-family: 'Fraunces', serif; }
.kpi-trend { font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.kpi-trend.up { color: var(--green); }
.kpi-trend.down { color: var(--red); }
.kpi-trend.mute { color: var(--text-3); }

/* ============ Tags / Pills / Badges ============ */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10.5px;
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 500;
  letter-spacing: 0.2px;
}
.tag-purple { background: var(--purple-soft); color: var(--purple); }
.tag-orange { background: var(--orange-soft); color: var(--orange); }
.tag-blue { background: var(--blue-soft); color: var(--blue); }
.tag-pink { background: var(--pink-soft); color: var(--pink); }
.tag-green { background: var(--green-soft); color: var(--green); }
.tag-amber { background: var(--amber-soft); color: var(--amber); }
.tag-gray { background: var(--bg-2); color: var(--text-2); border: 1px solid var(--border); }
.badge-published {
  background: var(--blue);
  color: #042C53;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-draft {
  background: var(--bg-2);
  color: var(--text-2);
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.badge-scheduled {
  background: var(--amber-soft);
  color: var(--amber);
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ============ Table ============ */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.tbl thead th {
  text-align: left;
  font-size: 10.5px;
  color: var(--text-3);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
  padding: 12px 16px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.tbl thead th:first-child { border-top-left-radius: 10px; }
.tbl thead th:last-child { border-top-right-radius: 10px; }
.tbl tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-1);
  vertical-align: middle;
}
.tbl tbody tr { transition: background 0.15s; }
.tbl tbody tr:hover { background: var(--bg-2); }
.tbl tbody tr:last-child td { border-bottom: 0; }

/* ============ Page transitions ============ */
.page { animation: fadeUp 0.4s cubic-bezier(0.2, 0.6, 0.3, 1); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ Channel grid ============ */
.channel-grid, .story-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.channel-card, .story-card-lg {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
}
.channel-card:hover, .story-card-lg:hover {
  transform: translateY(-2px);
  border-color: var(--border-hover);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
}
.channel-cover, .story-cover-lg {
  height: 180px;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 12px;
}
.channel-cover::after, .story-cover-lg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
}
.channel-cover-actions, .story-cover-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  z-index: 2;
}
.icon-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-1);
}
.icon-btn:hover { background: rgba(0, 0, 0, 0.75); border-color: rgba(255, 255, 255, 0.25); }
.icon-btn.danger:hover { color: var(--red); }
.channel-body, .story-body-lg {
  padding: 14px 18px 18px;
}
.channel-title, .story-title-lg {
  font-family: 'Fraunces', serif;
  font-size: 19px;
  font-weight: 500;
  color: var(--text-1);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.channel-desc, .story-desc-lg {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
  margin-top: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.channel-stats, .story-stats-lg {
  display: flex;
  gap: 14px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-3);
}
.channel-stats strong, .story-stats-lg strong {
  color: var(--text-1);
  font-weight: 500;
}

/* ============ Filter bar ============ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.chip {
  background: var(--bg-1);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 99px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--border-hover); color: var(--text-1); }
.chip.active {
  background: var(--blue-soft);
  border-color: rgba(77, 208, 255, 0.3);
  color: var(--blue);
}
.select {
  background: var(--bg-1);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 9px;
  font-family: inherit;
  cursor: pointer;
  outline: 0;
}
.select:hover { border-color: var(--border-hover); }

/* ============ Forms ============ */
.form-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  padding: 22px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.form-row:last-child { border-bottom: 0; }
.form-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-1);
}
.form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; line-height: 1.5; }
.input, .textarea {
  background: var(--bg-1);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 9px;
  width: 100%;
  font-family: inherit;
  outline: 0;
  transition: all 0.15s;
}
.input:focus, .textarea:focus {
  border-color: var(--blue);
  background: rgba(77, 208, 255, 0.04);
  box-shadow: 0 0 0 3px rgba(77, 208, 255, 0.1);
}
.textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 11px;
  padding: 32px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg-0);
}
.upload-zone:hover {
  border-color: var(--blue);
  background: rgba(77, 208, 255, 0.03);
}
.upload-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--blue-soft);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
}

/* ============ Story detail tabs ============ */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 22px;
}
.tab {
  padding: 11px 18px;
  font-size: 12.5px;
  color: var(--text-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-weight: 500;
  background: transparent;
  border-left: 0;
  border-right: 0;
  border-top: 0;
  font-family: inherit;
}
.tab:hover { color: var(--text-1); }
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }

/* ============ Activity items ============ */
.activity { display: flex; flex-direction: column; gap: 14px; }
.activity-item { display: flex; gap: 12px; align-items: flex-start; }
.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.activity-body { font-size: 12.5px; color: var(--text-2); line-height: 1.55; }
.activity-body strong { color: var(--text-1); font-weight: 500; }
.activity-body em { color: var(--blue); font-style: normal; }
.activity-time { font-size: 10.5px; color: var(--text-4); margin-top: 3px; letter-spacing: 0.2px; }

/* ============ Vote bars ============ */
.vote-row { margin-bottom: 12px; }
.vote-row-head {
  display: flex;
  justify-content: space-between;
  font-size: 12.5px;
  color: var(--text-2);
  margin-bottom: 6px;
}
.vote-row-head .pct { color: var(--text-1); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.vote-row-head .winner { color: var(--orange); font-weight: 600; }
.vote-bar {
  height: 8px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 99px;
  overflow: hidden;
}
.vote-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.2, 0.6, 0.3, 1);
}

/* ============ Live pill ============ */
.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--orange-soft);
  color: var(--orange);
  font-size: 11px;
  padding: 4px 11px;
  border-radius: 99px;
  font-weight: 500;
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--orange);
  animation: pulse 1.6s infinite;
}

/* ============ Episode cards ============ */
.episode-row {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 14px 18px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 60px 1fr auto auto auto;
  gap: 16px;
  align-items: center;
  transition: all 0.15s;
}
.episode-row:hover { border-color: var(--border-hover); background: var(--bg-2); }
.episode-num {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--purple-soft), rgba(179, 136, 255, 0.04));
  border: 1px solid rgba(179, 136, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;

function topbar(eyebrow, title, sub, actions) {
  return `
    <div class="topbar">
      <div class="topbar-left">
        <div class="eyebrow">${eyebrow}</div>
        <h1>${title}</h1>
        ${sub ? `<div class="topbar-sub">${sub}</div>` : ''}
      </div>
      <div class="topbar-right">${actions || ''}</div>
    </div>
  `;
}

function searchBox(placeholder) {
  return `
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7E8AB0" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
      <input placeholder="${placeholder}"/>
    </div>
  `;
}

// ============ DASHBOARD ============
function renderDashboard() {
  // Build engagement dot grid (28x7 = 196 cells)
  let dots = '';
  for (let i = 0; i < 28 * 7; i++) {
    const r = Math.random();
    let cls = '';
    if (r > 0.85) cls = 'l4';
    else if (r > 0.65) cls = 'l3';
    else if (r > 0.45) cls = 'l2';
    else if (r > 0.25) cls = 'l1';
    dots += `<div class="dot-cell ${cls}"></div>`;

// ============ BIND PAGE INTERACTIONS ============
function bindPage() {
  const main = document.getElementById('main');

  main.querySelectorAll('[data-story-id]').forEach(el => {
    el.addEventListener('click', e => {
      const id = parseInt(el.dataset.storyId);
      navigate('story-detail', { id, tab: 'overview' });
    });
  });

  main.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.dataset.tab;
      navigate('story-detail', { id: routeData?.id || 1, tab });
    });
  });

  main.querySelectorAll('[data-vote-tab]').forEach(el => {
    el.addEventListener('click', () => {
      main.querySelectorAll('[data-vote-tab]').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const target = el.dataset.voteTab;
      document.getElementById('votes-table').style.display = target === 'votes' ? 'block' : 'none';
      document.getElementById('polls-table').style.display = target === 'polls' ? 'block' : 'none';
    });
  });

  main.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('on'));
  });

  main.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      // Only toggle within sibling group
      const siblings = c.parentElement.querySelectorAll('.chip');
      siblings.forEach(s => s.classList.remove('active'));
      c.classList.add('active');
    });
  });

  // Action buttons
  const actions = {
    'new-story': () => { toast('Opening story creator...'); navigate('stories'); },
    'add-story': () => { toast('Opening story creator...'); },
    'add-channel': () => { toast('Opening channel creator...'); },
    'add-season': () => { toast('Opening season form...'); },
    'add-episode': () => { toast('Opening episode editor...'); navigate('episode-editor'); },
    'edit-episode': () => navigate('episode-editor'),
    'all-stories': () => navigate('stories'),
    'open-vote': () => navigate('votes'),
    'back-to-stories': () => navigate('stories'),
    'preview': () => toast('Preview opened in new window'),
    'save-draft': () => toast('Draft saved'),
    'schedule': () => toast('Episode scheduled for May 02'),
    'comp-sub': () => toast('Comp subscription form opened'),
    'save-settings': () => toast('Settings saved'),
    'export': () => toast('Exporting CSV...'),
  };

  main.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const action = el.dataset.action;
      if (actions[action]) actions[action]();
    });
  });
}
